apiVersion: v1
kind: Secret
metadata:
  name: naar-noor-db-secret
  namespace: naar-noor
  labels:
    app: naar-noor
    component: database
type: Opaque
stringData:
  sa-password: "YourSecurePassword123!@"
  connection-string: "Server=naar-noor-database;Database=db54355;User Id=sa;Password=YourSecurePassword123!@;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True;"
---
apiVersion: v1
kind: Secret
metadata:
  name: naar-noor-docker-registry
  namespace: naar-noor
  labels:
    app: naar-noor
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "ghcr.io": {
        "auth": "YOUR_BASE64_ENCODED_GITHUB_TOKEN_HERE"
      }
    }
